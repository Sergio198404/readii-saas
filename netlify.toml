[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173

[functions]
  external_node_modules = ["@anthropic-ai/sdk"]
  included_files = ["netlify/functions/proposal-template.html"]

[functions."daily-brief"]
  # web_search 需要更长时间

# SPA 路由 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
